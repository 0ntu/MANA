version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mana-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: mana-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mana
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: mana-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: always

volumes:
  mongodb_data:
